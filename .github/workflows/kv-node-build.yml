name: kv-node build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chaincodes/kv-node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: chaincodes/kv-node/.nvmrc
          cache: npm
          cache-dependency-path: chaincodes/kv-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
